apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.persistence.conf.name }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.persistence.conf.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  storageClassName: {{ .Values.persistence.conf.storageClassName }}
  accessModes:
{{- toYaml .Values.persistence.conf.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.conf.storageSize }}
