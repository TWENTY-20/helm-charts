apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.nameOverride | default .Release.Name }}
  serviceName: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride | default .Release.Name }}
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        checksum/metrics-configmap: {{ include "youtrack.metricsConfigChecksum" . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: {{ .Values.persistence.data.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.name }}
        - name: {{ .Values.persistence.conf.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.conf.name }}
        - name: {{ .Values.persistence.logs.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.logs.name }}
        - name: {{ .Values.persistence.backups.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.backups.name }}
        {{- if .Values.persistence.temp.enabled }}
        - name: {{ .Values.persistence.temp.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.temp.name }}
        {{- end }}
        - name: {{ .Values.config.name }}
          projected:
            sources:
              - configMap:
                  name: {{ .Values.config.name }}
        {{- if .Values.metrics.enabled }}
        - name: metrics-config
          configMap:
            name: {{ printf "%s-metrics" .Values.config.name }}
        - name: jmx-exporter-agent
          emptyDir: {}
        {{- end }}
        {{- with .Values.sidecars.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-{{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: {{ .Values.persistence.data.name }}
              mountPath: /opt/youtrack/data
            - name: {{ .Values.persistence.conf.name }}
              mountPath: /opt/youtrack/conf
            - name: {{ .Values.persistence.logs.name }}
              mountPath: /opt/youtrack/logs
            - name: {{ .Values.persistence.backups.name }}
              mountPath: /opt/youtrack/backups
            {{- if .Values.persistence.temp.enabled }}
            - name: {{ .Values.persistence.temp.name }}
              mountPath: /opt/youtrack/temp
            {{- end }}
            {{- if eq .Values.config.mountStrategy "copy" }}
            - name: {{ .Values.config.name }}
              mountPath: /tmp/youtrack-config
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics-config
              mountPath: /jmx-exporter-config
            - name: jmx-exporter-agent
              mountPath: /jmx-exporter
            {{- end }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
{{ include "youtrack.initContainerScript" . | trim | indent 14 }}
      containers:
        - name: {{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.service.enabled .Values.metrics.enabled }}
          ports:
            {{- if .Values.service.enabled }}
            - containerPort: {{ .Values.service.port }}
              name: {{ .Values.service.name }}
              protocol: {{ .Values.service.protocol }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
              protocol: TCP
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: {{ .Values.persistence.data.name }}
              mountPath: /opt/youtrack/data
            - name: {{ .Values.persistence.conf.name }}
              mountPath: /opt/youtrack/conf
            - name: {{ .Values.persistence.logs.name }}
              mountPath: /opt/youtrack/logs
            - name: {{ .Values.persistence.backups.name }}
              mountPath: /opt/youtrack/backups
            {{- if .Values.persistence.temp.enabled }}
            - name: {{ .Values.persistence.temp.name }}
              mountPath: /opt/youtrack/temp
            {{- end }}
            {{- if eq .Values.config.mountStrategy "subPath" }}
            - name: {{ .Values.config.name }}
              mountPath: /opt/youtrack/conf/youtrack.jvmoptions
              subPath: youtrack.jvmoptions
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: jmx-exporter-agent
              mountPath: /opt/youtrack/jmx-exporter
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- with .Values.sidecars.containers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
