apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.nameOverride | default .Release.Name }}
  serviceName: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride | default .Release.Name }}
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: {{ .Values.persistence.data.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.name }}
        - name: {{ .Values.persistence.conf.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.conf.name }}
        - name: {{ .Values.persistence.logs.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.logs.name }}
        - name: {{ .Values.persistence.backups.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.backups.name }}
        {{- if .Values.persistence.temp.enabled }}
        - name: {{ .Values.persistence.temp.name }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.temp.name }}
        {{- end }}
        - name: {{ .Values.config.name }}
          projected:
            sources:
              - configMap:
                  name: {{ .Values.config.name }}
        {{- with .Values.sidecars.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-{{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: {{ .Values.persistence.data.name }}
              mountPath: /opt/youtrack/data
            - name: {{ .Values.persistence.conf.name }}
              mountPath: /opt/youtrack/conf
            - name: {{ .Values.persistence.logs.name }}
              mountPath: /opt/youtrack/logs
            - name: {{ .Values.persistence.backups.name }}
              mountPath: /opt/youtrack/backups
            {{- if .Values.persistence.temp.enabled }}
            - name: {{ .Values.persistence.temp.name }}
              mountPath: /opt/youtrack/temp
            {{- end }}
            {{- if eq .Values.config.mountStrategy "copy" }}
            - name: {{ .Values.config.name }}
              mountPath: /tmp/youtrack-config
            {{- end }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- if eq .Values.config.mountStrategy "copy" }}
              cp /tmp/youtrack-config/youtrack.jvmoptions /opt/youtrack/conf/youtrack.jvmoptions || exit 1
              {{- end }}

              {{- if .Values.metrics.enable }}
              cp /tmp/youtrack-config/jmx_exporter.yaml /opt/youtrack/conf/jmx_exporter.yaml || exit 1
              if ! [ -f /opt/youtrack/conf/.exporter-version ] || [ "$(cat /opt/youtrack/conf/.exporter-version)" != "{{ .Values.metrics.exporterVersion }}" ]; then
                echo "* Updating JMX exporter"
                curl -L \
                  -o /opt/youtrack/conf/jmx_prometheus_javaagent.jar \
                  https://github.com/prometheus/jmx_exporter/releases/download/v{{ .Values.metrics.exporterVersion }}/jmx_prometheus_javaagent-{{ .Values.metrics.exporterVersion }}.jar \
                  && echo "{{ .Values.metrics.exporterVersion }}" >/opt/youtrack/conf/.exporter-version
              else
                echo "* JMX exporter is up-to-date"
              fi
              {{- end }}
              
              /opt/youtrack/bin/youtrack.sh configure --base-url="{{ .Values.config.baseUrl }}" --listen-port="{{ .Values.service.port }}" {{ if .Values.metrics.enable }}-J-javaagent:/opt/youtrack/conf/jmx_prometheus_javaagent.jar=9404:/opt/youtrack/conf/jmx_exporter.yaml{{ end }}
      containers:
        - name: {{ if .Values.fullnameOverride }}{{ .Values.fullnameOverride }}{{ else }}{{ .Values.nameOverride | default .Release.Name }}{{ end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.service.enabled }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: {{ .Values.service.name }}
              protocol: {{ .Values.service.protocol }}
          {{- end }}
          volumeMounts:
            - name: {{ .Values.persistence.data.name }}
              mountPath: /opt/youtrack/data
            - name: {{ .Values.persistence.conf.name }}
              mountPath: /opt/youtrack/conf
            - name: {{ .Values.persistence.logs.name }}
              mountPath: /opt/youtrack/logs
            - name: {{ .Values.persistence.backups.name }}
              mountPath: /opt/youtrack/backups
            {{- if .Values.persistence.temp.enabled }}
            - name: {{ .Values.persistence.temp.name }}
              mountPath: /opt/youtrack/temp
            {{- end }}
            {{- if eq .Values.config.mountStrategy "subPath" }}
            - name: {{ .Values.config.name }}
              mountPath: /opt/youtrack/conf/youtrack.jvmoptions
              subPath: youtrack.jvmoptions
            {{- if .Values.metrics.enable }}
            - name: {{ .Values.config.name }}
              mountPath: /opt/youtrack/conf/jmx_exporter.yaml
              subPath: jmx_exporter.yaml
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- with .Values.sidecars.containers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
