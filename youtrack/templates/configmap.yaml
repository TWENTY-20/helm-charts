apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.name }}
  namespace: {{ .Release.Namespace }}
data:
  youtrack.jvmoptions: |
    {{- $baseUrl := trim (toString .Values.config.baseUrl) }}
    {{- if not $baseUrl }}
    {{- fail "config.baseUrl must be set to a non-empty URL." }}
    {{- end }}
    {{- range $option := .Values.config.options }}
    {{- $optionString := trim (toString $option) }}
    {{- if regexMatch "^-Dbase-url=.*$" $optionString }}
    {{- fail "Do not set -Dbase-url in config.options. Set config.baseUrl instead; the chart configures base-url via init container and writes -Dbase-url into ConfigMap." }}
    {{- end }}
    {{- if regexMatch "^-Dlisten-port=.*$" $optionString }}
    {{- fail "Do not set -Dlisten-port in config.options. Set service.port instead; the chart configures listen-port via init container configure --listen-port." }}
    {{- end }}
    {{- end }}
    -Dbase-url={{ $baseUrl }}
    {{- if .Values.metrics.enabled }}
    -Djava.util.logging.config.file=/opt/youtrack/jmx-exporter/jmx_logging.properties
    -javaagent:/opt/youtrack/jmx-exporter/jmx_prometheus_javaagent.jar={{ .Values.metrics.port }}:/opt/youtrack/jmx-exporter/jmx_exporter.yaml
    {{- end }}
    {{- range $option := .Values.config.options }}
    {{- if $option }}
    {{ $option }}
    {{- end }}
    {{- end }}
