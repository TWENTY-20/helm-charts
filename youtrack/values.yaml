image:
  repository: jetbrains/youtrack
  pullPolicy: Always
  tag: 2026.1.13162

# Secrets for pulling images from a private container registry
imagePullSecrets: []

# Security context applied at the pod level
podSecurityContext:
  fsGroup: 13001

# Security context for containers
securityContext:
  runAsNonRoot: true
  runAsGroup: 13001
  runAsUser: 13001
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # <- need to be false otherwise error
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

# Official requirements for YouTrack https://www.jetbrains.com/help/youtrack/server/youtrack-supported-environments.html#hardware-requirements

# Define resource requests and limits for the init container
initContainerResources:
  requests:
    cpu: 300m
    memory: 2000Mi
  limits:
#    cpu: 300m
#    memory: 2000Mi

# Define resource requests and limits for the main container
resources:
  requests:
    cpu: 300m
    memory: 2000Mi
  limits:
#     cpu: 300m
#     memory: 4Gi

# Configure your volumes
persistence:
  data:
    name: youtrack-data
    storageClassName: csi-disk-default
    storageSize: 50Gi
    accessModes:
      - ReadWriteOnce
    annotations: {}
      # Example (T-Cloud Public EVS):
      # everest.io/disk-volume-type: SSD

  logs:
    name: youtrack-logs
    storageClassName: csi-disk-default
    storageSize: 5Gi
    accessModes:
      - ReadWriteOnce
    annotations: {}
      # Example (T-Cloud Public EVS):
      # everest.io/disk-volume-type: SSD

  conf:
    name: youtrack-config
    storageClassName: csi-disk-default
    storageSize: 1Gi
    accessModes:
      - ReadWriteOnce
    annotations: {}
      # Example (T-Cloud Public EVS):
      # everest.io/disk-volume-type: SSD

  temp:
    enabled: false # default false, helpful when Upgrade/SetUp from Backup which is bigger then 20Gi
    name: youtrack-temp
    storageClassName: csi-disk-default
    storageSize: 100Gi
    accessModes:
      - ReadWriteOnce
    annotations: {}
      # Example (T-Cloud Public EVS):
      # everest.io/disk-volume-type: SSD

# Configure how backups will be saved
  backups:
    backupType: volumeStorage # ⚠️ Choose backupType: "objectStorage" or "volumeStorage", only one can be active at a time
    name: youtrack-backup
    annotations: {} # Applied to the backup PersistentVolume (PV) metadata
      # everest.io/reclaim-policy: retain-volume-only

    objectStorage: # This setting only effective when backupType is set to objectStorage
      storageClassName: csi-obsfs-retain
      fsType: obsfs
      persistentVolumeReclaimPolicy: Retain
      csiDriver: obs.csi.everest.io # example T-Cloud Public: obs.csi.everest.io Azure: blob.csi.azure.com
      bucketId: your-bucket-id
      accessKeySecretKeySecretName: your-bucket-secret
      size: 100Gi
      mountOptions: []
      accessModes:
        - ReadWriteMany
      volumeAttributes: {}
        # storage.kubernetes.io/csiProvisionerIdentity: everest-csi-provisioner
        # everest.io/obs-volume-type: STANDARD
        # everest.io/region: eu-de
      annotations: {} # Applied to the backup PersistentVolumeClaim (PVC) metadata for objectStorage mode

    volumeStorage: # This setting only effective when backupType is set to volumeStorage
      storageClassName: csi-disk-default
      storageSize: 50Gi
      accessModes:
        - ReadWriteOnce
      annotations: {} # Applied to the backup PersistentVolumeClaim (PVC) metadata for volumeStorage mode
        # everest.io/disk-volume-type: SATA

# Configure your YouTrack
config:
  name: configmap
  baseUrl: "http://127.0.0.1:8080" # default for local/port-forward setup; ⚠️ set external URL for production

  # Entries are written 1:1 into /opt/youtrack/conf/youtrack.jvmoptions
  # Docs:
  # - Configure JVM options: https://www.jetbrains.com/help/youtrack/server/configure-jvm-options.html
  # - Configuration parameters: https://www.jetbrains.com/help/youtrack/server/youtrack-java-start-parameters.html
  # -Dlisten-port is reserved:
  # - the chart configures listen-port via init container: configure --listen-port=<service.port>
  # - do not set -Dlisten-port in config.options (rendering fails)
  options:
# Examples:
#    - -Ddisable.configuration.wizard.on.upgrade=true
#    - -Djetbrains.youtrack.admin.restore=false
#    - -Djetbrains.youtrack.support.email=youtrack-feedback@jetbrains.com
#    - -Djetbrains.youtrack.disableCheckForUpdate=false
#    - -Djetbrains.dnq.textIndex.minPrefixQueryLength=3
#    - -Djetbrains.youtrack.mailLimit=0
#    - -Djetbrains.youtrack.event.merge.timeout=60000
#    - -Djetbrains.youtrack.default.page=/dashboard
#    - -Djetbrains.youtrack.webHooksBaseUrl=
#    - -Djetbrains.http.request.header.buffer.size=102400
#    - -Djetbrains.http.response.header.buffer.size=102400
#    - -Djetbrains.youtrack.licenseName=
#    - -Djetbrains.youtrack.licenseKey=
#    - -Djetbrains.youtrack.dumbMode=false
#    - -Djetbrains.youtrack.ai.platform.config.url=
#    - -Djetbrains.youtrack.singleTierApp=false
#    - -Djetbrains.hub.auth.login.throttling.enabled=false
#    - -Djetbrains.hub.admin.skip=false
#    - -Dsecure-mode=disable
#    - -Dstatistics-upload=false
#    - -Dexodus.log.forceCheckDataConsistency=false
#    - -Dexodus.entityStore.refactoring.clearBrokenBlobs=false
#    - -Dfile.encoding=UTF-8
#    - -Djava.awt.headless=false
#    - -ea
#    - -da
#    - -debug
#    - -sdebug
#    - -XX:-HeapDumpOnOutOfMemoryError
#    - -XX:HeapDumpPath=/dev/null
#    - -XX:ErrorFile=%APP_LOGS_DIR%%FILE_SEPARATOR%hs_err_pid%%p.log
#    - -XX:MetaspaceSize=350m
#    - -XX:MaxMetaspaceSize=350m
#    - -Xmx1024m

  # ConfigMap mount strategy for youtrack.jvmoptions file
  # - "copy": Mount ConfigMap to /tmp and copy file to /opt/youtrack/conf (default, more portable)
  # - "subPath": Mount ConfigMap directly using subPath (may cause issues with some CSI drivers like NFS-CSI)
  mountStrategy: subPath

# General Parameters: https://www.jetbrains.com/help/youtrack/server/youtrack-java-start-parameters.html#general-parameters
  youtrackAdminRestore: false # default is false
  youtrackSupportEmail: youtrack-feedback@jetbrains.com # default is youtrack-feedback@jetbrains.com
  youtrackDisableCheckForUpdate: false
  dnqTextIndexMinPrefixQueryLength: 3 # default is 3
  youtrackMailLimit: 0 # default is 0
  youtrackEventMergeTimeout: 60000 # default is 6000
  youtrackDefaultPage: /dashboard # default is /dashboard
  youtrackWebHookBaseUrl: "" # default is empty
  httpRequestHeaderBufferSize: 102400 # default is 102400
  httpResponseHeaderBufferSize: 102400 # default is 102400
  youtrackLicenseName: "" # default is empty
  youtrackLincenseKey: "" # default is empty, can be added later via WebUI
  youtrackDumbMode: false # default is false
  youtrackAiPlatformConfigUrl: "" # default is empty

# Environmental Parameters: https://www.jetbrains.com/help/youtrack/server/youtrack-java-start-parameters.html#environmental-parameters
  secureMode: disable  # disable (default) or tls
  statisticsUpload: false # default is false

# Authentication Throttling Parameters: https://www.jetbrains.com/help/youtrack/server/youtrack-java-start-parameters.html#throttling-parameters
  hubAuthLoginThrottlingEnabled: false # default is false

# JVM Options
  heapDumpOnOutOfMemoryError: false # default is false
  heapDumpPath: /dev/null # /dev/null is default
  errorFile: "" # e.g. %APP_LOGS_DIR%%FILE_SEPARATOR%hs_err_pid%%p.log
  javaAwtHeadless: false # default is false
  fileEncoding: "" # e.g. UTF-8
  enableAssertions: false # default is false
  disableAssertions: false # default is false
  youtrackSingleTierApp: false # default is false
  metaspaceSize: 350m # default is 350m
  maxMetaspaceSize: 350m # default is 350m
  xmx: 1024m # default is 1024m

# Extra Parameters
  debug: false # default is false
  sdebug: false # default is false
  clearBrokenBlobs: false # default is false
  hubAdminSkip: false # default is false
  forceCheckDataConsistency: false # default is false

# Service definition
service:
  enabled: true
  name: http
  port: 8080
  protocol: TCP

# Ingress definition
ingress:
  enabled: true
  name: youtrack-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-staging"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # active the annotation below if ipWhitelist.enabled is set to true
    # traefik.ingress.kubernetes.io/router.middlewares: ip-whitelist@kubernetescrd

# Use this to restrict access to YouTrack to specific IP addresses
ipWhitelist:
  enabled: false
  name: ip-whitelist # when setting to true add the name to the ingress annotations under router.middlewares section
  sourceRange:
    - XXX.XXX.XXX.XXX/XX # specify your allowed IP's ranges here

# Enable or disable whitelisting for Traefik and Cert-Manager components
networkPolicyWhitelist:
  traefik:
    enabled: false
  cert-manager:
    enabled: false
    port: 8089

# Optional: Override names and configure pod scheduling preferences
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
